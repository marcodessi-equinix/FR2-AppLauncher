name: applauncher

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      - applauncher-data:/app/data
      - applauncher-uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=${DATABASE_PATH:-/app/data/applauncher.db}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env or your stack manager}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env or your stack manager}
      - FRONTEND_URL=${FRONTEND_URL:-}
      - COOKIE_SECURE=${COOKIE_SECURE:-auto}
      - ALLOW_INSECURE_DEFAULTS=false
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    networks:
      - internal
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    expose:
      - "3000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${APP_PORT:-9020}:80"

networks:
  internal:
    driver: bridge

volumes:
  applauncher-data:
  applauncher-uploads:
