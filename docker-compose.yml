name: applauncher

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_PATH: /app/data/applauncher.db
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      FRONTEND_URL: ${FRONTEND_URL:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-auto}
      ALLOW_INSECURE_DEFAULTS: "false"
    volumes:
      - applauncher-data:/app/data
      - applauncher-uploads:/app/uploads
    expose:
      - "3000"
    networks:
      npm_proxy:
        aliases:
          - applauncher-backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    # ports:
    #   - "${APP_PORT:-9020}:80"   # uncomment to also allow direct access via VM:9020
    networks:
      npm_proxy:
        aliases:
          - applauncher-frontend

networks:
  npm_proxy:
    external: true
    name: ${NPM_NETWORK:-nginx-proxy-manager_default}

volumes:
  applauncher-data:
  applauncher-uploads:
