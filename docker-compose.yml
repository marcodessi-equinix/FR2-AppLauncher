name: applauncher

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      - applauncher-data:/app/data
      - applauncher-uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=/app/data/applauncher.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - FRONTEND_URL=${FRONTEND_URL:-}
      - COOKIE_SECURE=${COOKIE_SECURE:-auto}
      - ALLOW_INSECURE_DEFAULTS=false
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    networks:
      internal:
        aliases:
          - applauncher-backend
    restart: unless-stopped
    expose:
      - "3000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
      - proxy
    restart: unless-stopped
    ports:
      - "${APP_PORT:-9020}:80"

networks:
  internal:
    driver: bridge
  proxy:
    external: true
    name: ${PROXY_NETWORK:-npm_proxy}

volumes:
  applauncher-data:
  applauncher-uploads:
