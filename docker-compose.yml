services:
  backend:
    container_name: fr2-applauncher-backend
    hostname: backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      - fr2-applauncher-data:/app/data
      - fr2-applauncher-uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=${DATABASE_PATH:-/app/data/applauncher.db}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in Portainer or .env}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in Portainer or .env}
      - FRONTEND_URL=${FRONTEND_URL:-}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - ALLOW_INSECURE_DEFAULTS=false
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    networks:
      - fr2-applauncher
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    expose:
      - "3000"

  frontend:
    container_name: fr2-applauncher-frontend
    hostname: frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_BUILD_NUMBER: ${VITE_BUILD_NUMBER:-001}
    networks:
      - fr2-applauncher
      - proxy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${FRONTEND_PORT:-9020}:80"

networks:
  fr2-applauncher:
  proxy:
    name: ${PROXY_NETWORK:-nginx-proxy-manager_default}
    external: true

volumes:
  fr2-applauncher-data:
    name: fr2-applauncher-data
  fr2-applauncher-uploads:
    name: fr2-applauncher-uploads
