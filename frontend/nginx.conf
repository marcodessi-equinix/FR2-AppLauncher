server {
    listen 80 default_server;
    server_name _;
    server_tokens off;
    client_max_body_size 50m;
    absolute_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Detect the original protocol when running behind a reverse proxy.
    set $forwarded_proto $scheme;
    if ($http_x_forwarded_proto) {
        set $forwarded_proto $http_x_forwarded_proto;
    }

    # Static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location = /runtime-config.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/javascript;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;

        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.open-meteo.com https://api.iconify.design; frame-ancestors 'none';" always;
    }

    # API reverse proxy to the backend container
    # Use a variable so nginx re-resolves DNS on every request instead of
    # caching the IP once at startup.  This prevents 502 errors when the
    # backend container restarts and gets a different IP address.
    #
    # __RESOLVER__ is replaced at container start by frontend-entrypoint.sh
    # with the actual nameserver from /etc/resolv.conf (works for Docker
    # AND Podman).
    location /api/ {
        resolver __RESOLVER__ valid=30s ipv6=off;
        set $upstream_backend http://backend:3000;
        proxy_pass $upstream_backend;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host  $http_host;

        # Return JSON instead of HTML on gateway errors so the frontend
        # can display a meaningful message rather than "API returned HTML".
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_unavailable;
    }

    # Uploaded icons reverse proxy
    location /uploads/ {
        resolver __RESOLVER__ valid=30s ipv6=off;
        set $upstream_backend http://backend:3000;
        proxy_pass $upstream_backend;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host  $http_host;
    }

    # JSON error response for API gateway errors.
    # Keeps the frontend from seeing "API returned HTML instead of JSON".
    location @api_unavailable {
        internal;
        default_type application/json;
        return 502 '{"error":"Backend temporarily unavailable","status":502}';
    }
}
