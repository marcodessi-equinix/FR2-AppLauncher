# ------------------------------------------------------------------
# The production nginx configuration lives in frontend/nginx.conf
# and is copied into the Docker image by Dockerfile.frontend.
#
# This file is kept only as a reference / fallback for host-level
# nginx setups that reverse-proxy to the Docker stack.
# ------------------------------------------------------------------

server {
    listen 80;
    server_name _;

    location / {
        # Forward everything to the AppLauncher frontend container.
        # Adjust the port if you changed APP_PORT in .env.
        proxy_pass http://127.0.0.1:9020;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
