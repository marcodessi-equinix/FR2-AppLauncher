name: applauncher

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_PATH: /app/data/applauncher.db
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required for proxy deployments}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      ALLOW_INSECURE_DEFAULTS: "false"
    volumes:
      - applauncher-data:/app/data
      - applauncher-uploads:/app/uploads
    expose:
      - "3000"
    networks:
      app:
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        APP_VERSION: ${APP_VERSION:-}
        APP_GIT_SHA: ${APP_GIT_SHA:-}
        APP_BUILD_DATE: ${APP_BUILD_DATE:-}
        APP_BUILD_TIME: ${APP_BUILD_TIME:-}
        APP_BUILD_NUMBER: ${APP_BUILD_NUMBER:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    networks:
      app:
      proxy:
        aliases:
          - ${PROXY_FRONTEND_ALIAS:-applauncher-frontend}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 15s

networks:
  app:
    driver: bridge
  proxy:
    external: true
    name: ${NPM_NETWORK:?NPM_NETWORK is required for proxy deployments}

volumes:
  applauncher-data:
  applauncher-uploads:
